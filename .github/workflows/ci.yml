name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # Core deps only — the oracle extras (pypsa/pandapower/andes) are heavy
      # and version-sensitive; oracle tests skip themselves when the packages
      # are absent, so the core suite stays fast and reliable.
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run tests (core, oracles skipped)
        run: python -m pytest glassbox/tests/ -q --tb=short

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend (typecheck + bundle)
        working-directory: frontend
        run: |
          npm ci
          npm run build
